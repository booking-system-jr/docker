version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  config-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.config-service
    ports:
      - "8888:8888"
    volumes:
      - ./../config-repo:/config-repo
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/application/default || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  discovery-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.discovery
    restart: on-failure
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - backend

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.user-service
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345678}
      - JWT_KEYSTORE_PASSWORD=${USER_JWT_KEYSTORE_PASSWORD}
      - JWT_KEY_PASSWORD=${USER_JWT_KEY_PASSWORD}
      - JWT_KEYSTORE_ALIAS=${USER_JWT_KEYSTORE_ALIAS}
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - backend

  listing-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.listing-service
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345678}
    depends_on:
      postgres:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - backend

  booking-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.booking-service
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345678}
    depends_on:
      postgres:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - backend

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      config-service:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge